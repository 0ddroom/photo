name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Write public Supabase config
        run: |
          test -n "${{ vars.SUPABASE_URL }}"
          test -n "${{ vars.SUPABASE_ANON_KEY }}"
          cat > app/config.js <<EOF
          export const DEFAULT_CONFIG = {
            supabaseUrl: '${{ vars.SUPABASE_URL }}',
            supabaseAnonKey: '${{ vars.SUPABASE_ANON_KEY }}',
            bucketName: 'event-photos',
            adminFunctionName: 'admin-photos',
            maxRecommendations: 3,
          };

          export function readSupabaseConfig(source) {
            const config = {
              bucketName: 'event-photos',
              adminFunctionName: 'admin-photos',
              maxRecommendations: 3,
              ...source,
            };

            if (!config.supabaseUrl || config.supabaseUrl.includes('YOUR-PROJECT')) {
              throw new Error('Supabase URL is not configured.');
            }

            if (!config.supabaseAnonKey || config.supabaseAnonKey.includes('YOUR_PUBLIC_ANON_KEY')) {
              throw new Error('Supabase anon key is not configured.');
            }

            return config;
          }

          export function getAppConfig() {
            const browserConfig = globalThis.PHOTO_GALLERY_CONFIG ?? DEFAULT_CONFIG;
            return readSupabaseConfig(browserConfig);
          }
          EOF

      - name: Test
        run: node scripts/run-tests.js

      - name: Verify static files
        run: node scripts/verify-static.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
